<svg viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg">

<defs>

  <style>

    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    @keyframes spinR { from{transform:rotate(0deg)} to{transform:rotate(-360deg)} }

    @keyframes floatA { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

    @keyframes floatB { 0%,100%{transform:translateY(0)} 50%{transform:translateY(5px)} }

    @keyframes pulseTabla { 0%,100%{opacity:0.7;r:52} 50%{opacity:1;r:55} }

    @keyframes waveMove { from{stroke-dashoffset:0} to{stroke-dashoffset:-120} }

    @keyframes barPulse1 { 0%,100%{transform:scaleY(0.5)} 33%{transform:scaleY(1)} 66%{transform:scaleY(0.7)} }

    @keyframes barPulse2 { 0%,100%{transform:scaleY(0.8)} 40%{transform:scaleY(0.4)} 70%{transform:scaleY(1)} }

    @keyframes barPulse3 { 0%,100%{transform:scaleY(0.6)} 20%{transform:scaleY(1)} 60%{transform:scaleY(0.5)} }

    @keyframes barPulse4 { 0%,100%{transform:scaleY(0.9)} 50%{transform:scaleY(0.3)} }

    @keyframes barPulse5 { 0%,100%{transform:scaleY(0.4)} 30%{transform:scaleY(1)} 80%{transform:scaleY(0.6)} }

    @keyframes glow { 0%,100%{opacity:0.5} 50%{opacity:0.9} }

    @keyframes notebounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    @keyframes scanline { 0%{transform:translateX(-200px)} 100%{transform:translateX(900px)} }

    @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:1} }



    .spin { transform-origin:340px 130px; animation:spin 20s linear infinite; }

    .spinR { transform-origin:340px 130px; animation:spinR 14s linear infinite; }

    .floatA { animation:floatA 3.2s ease-in-out infinite; }

    .floatB { animation:floatB 2.8s ease-in-out infinite 0.4s; }

    .wave1 { stroke-dasharray:8 4; animation:waveMove 2s linear infinite; }

    .wave2 { stroke-dasharray:5 6; animation:waveMove 1.6s linear infinite 0.3s; }

    .noteA { animation:notebounce 2.2s ease-in-out infinite 0.5s; }

    .noteB { animation:notebounce 1.8s ease-in-out infinite 1.1s; }

    .glowPulse { animation:glow 2s ease-in-out infinite; }



    .b1 { transform-origin:0 40px; animation:barPulse1 1.1s ease-in-out infinite; }

    .b2 { transform-origin:0 40px; animation:barPulse2 0.9s ease-in-out infinite 0.2s; }

    .b3 { transform-origin:0 40px; animation:barPulse3 1.3s ease-in-out infinite 0.1s; }

    .b4 { transform-origin:0 40px; animation:barPulse4 0.8s ease-in-out infinite 0.3s; }

    .b5 { transform-origin:0 40px; animation:barPulse5 1.2s ease-in-out infinite 0.15s; }

    .b6 { transform-origin:0 40px; animation:barPulse1 1.0s ease-in-out infinite 0.4s; }

    .b7 { transform-origin:0 40px; animation:barPulse3 0.95s ease-in-out infinite 0.25s; }



    .t1 { animation:twinkle 2.1s ease-in-out infinite; }

    .t2 { animation:twinkle 3.4s ease-in-out infinite 0.7s; }

    .t3 { animation:twinkle 1.8s ease-in-out infinite 1.2s; }

    .t4 { animation:twinkle 2.7s ease-in-out infinite 0.3s; }

  </style>



